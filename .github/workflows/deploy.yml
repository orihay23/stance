name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; never cancel one that's already
# rolling out mid-deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    needs: test
    runs-on: ubuntu-latest
    # Read by histoire.config.ts and apps/docs/.vitepress/config.ts to
    # switch both builds onto their GitHub Pages subpaths (/stance/ and
    # /stance/components/) instead of root — deliberately a job-scoped
    # custom flag, not the ambient GITHUB_ACTIONS var those configs used
    # to key off, since that's true for every workflow run, not just this
    # deploy one (see histoire.config.ts's comment on the CI job it broke).
    env:
      STANCE_DEPLOY_BASE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Histoire imports @stance-dev/core AND @stance-dev/themes through their
      # published entry points (dist/), not straight from source — since
      # Phase 16 gave @stance-dev/themes a real dist build for publishing,
      # anything resolving it by package specifier (including Histoire's
      # own stories) now goes through dist/index.js, not raw src/. Both
      # have to be built before "Build Histoire stories" (mirrors ci.yml's
      # visual-regression/docs-build jobs, which needed the identical fix).
      - name: Build @stance-dev/core
        run: pnpm --filter @stance-dev/core build

      - name: Build @stance-dev/themes
        run: pnpm --filter @stance-dev/themes build

      - name: Build Histoire stories
        run: pnpm --filter @stance-dev/playground story:build

      - name: Build VitePress site
        run: pnpm --filter @stance-dev/docs docs:build

      # VitePress at the root, Histoire stories under /components — kept in
      # sync with the base paths computed in apps/docs/.vitepress/config.ts.
      - name: Assemble Pages output
        run: |
          mkdir -p _site/components
          cp -r apps/docs/.vitepress/dist/. _site/
          cp -r apps/playground/.histoire/dist/. _site/components/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
