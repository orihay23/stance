name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Manual escape hatch for when a push to main doesn't trigger this
  # workflow on its own — notably, commits pushed using the default
  # GITHUB_TOKEN (e.g. update-baselines.yml's baseline commits) don't fire
  # `push` events on other workflows, by GitHub's own deliberate
  # anti-recursion design. Without this, those commits would silently never
  # get CI coverage.
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # No explicit "build @stance-dev/themes" step here: @stance-dev/core's own
      # `pretest` script (package.json) builds it automatically — pnpm
      # runs pre<script> hooks before the matching script by default, so
      # this is covered for local `pnpm test` too, not just CI. See that
      # script's neighboring comment for why it's needed at all (Phase 16
      # gave @stance-dev/themes a real dist build for publishing, so anything
      # resolving it by package specifier — including @stance-dev/core's own
      # tests/theme-test-utils.ts — now goes through dist/, not raw src/).
      - run: pnpm test

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Visual tests hit the built Histoire output, not the dev server, so
      # @stance-dev/core, @stance-dev/themes (playground stories import both
      # through dist/ — see the `test` job's comment on why themes needs a
      # build since Phase 16), and the Histoire build itself all have to
      # exist before Playwright runs.
      - name: Build @stance-dev/core
        run: pnpm --filter @stance-dev/core build

      - name: Build @stance-dev/themes
        run: pnpm --filter @stance-dev/themes build

      - name: Build Histoire stories
        run: pnpm --filter @stance-dev/playground story:build

      - name: Install Playwright browsers
        run: pnpm --filter @stance-dev/visual-tests exec playwright install --with-deps chromium

      - name: Run visual regression tests
        run: pnpm --filter @stance-dev/visual-tests test

      # Diff/actual/expected images and the trace viewer report, so a failing
      # PR can be diagnosed without re-running locally.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/visual-tests/playwright-report/
          retention-days: 14

      - name: Upload test-results (diffs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: apps/visual-tests/test-results/
          retention-days: 14

  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # apps/docs depends on @stance-dev/core and @stance-dev/themes (the theme
      # picker/ThemeStyles import it directly) through their published
      # entry points (dist/), same as Histoire — both have to be built
      # first. This also catches the class of bug the docs site exists to
      # dogfood: any component that isn't actually safe to prerender under
      # Vue SSR (the entire portal-based set — Dialog, Popover, Tooltip,
      # Dropdown Menu, DatePicker, Toast — is exercised here) fails this
      # build, not just a runtime error some consumer discovers later.
      - name: Build @stance-dev/core
        run: pnpm --filter @stance-dev/core build

      - name: Build @stance-dev/themes
        run: pnpm --filter @stance-dev/themes build

      - name: Build VitePress site
        run: pnpm --filter @stance-dev/docs docs:build

  # Runs only on push to main (not on PRs — publishing per-PR would be
  # meaningless), and only after test/visual-regression/docs-build have
  # all passed: `needs:` gates this on the real, existing required checks
  # rather than re-running a parallel/weaker check of its own, per
  # VERSIONING.md's stance that nothing ships without the full suite green.
  #
  # Runs on every push to main regardless of whether there's anything to
  # release — changesets/action decides internally what to do: if pending
  # changesets exist, it opens/updates a "Version Packages" PR (consuming
  # them into bumped package.json versions + CHANGELOG.md, not publishing
  # anything); once that PR is merged (no pending changesets left, but
  # versions are ahead of what's on npm), this same job publishes and tags.
  release:
    name: Release
    needs: [test, visual-regression, docs-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'orihay23/stance'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # changesets/action needs the full history to diff which
          # packages changed since each package's last release tag.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      # `changeset publish` packs whatever's already on disk — it doesn't
      # invoke either package's own `build` script — so both need to be
      # built here regardless of whether this run ends up publishing or
      # just opening a version PR (cheap either way, and simpler than
      # conditioning the build on which path changesets/action will take).
      - name: Build publishable packages
        run: |
          pnpm --filter @stance-dev/themes build
          pnpm --filter @stance-dev/core build

      - name: Create Release Pull Request or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          # Defaults to true, which makes this action create its own
          # GitHub Release per published package as part of the publish
          # step above — colliding with the "Create GitHub Releases for
          # published packages" step below (which runs second and always
          # loses: `gh release create` 422s with "Release.tag_name already
          # exists"). Confirmed on the first real publish
          # (@stance-dev/core@0.1.0 / @stance-dev/themes@0.1.0): npm
          # publish and the git tag push both succeeded, but the
          # dedicated release-creation step failed on that collision even
          # though both releases already existed correctly. Disabled here
          # so the step below stays the single source of truth for
          # release notes formatting.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # setup-node's `registry-url` above already wrote a global
          # (user-level, not repo) .npmrc auth line keyed off this exact
          # variable name — deliberately NOT a repo .npmrc edit: an
          # unconditional `${NPM_TOKEN}` line in the committed .npmrc
          # gets read by every pnpm invocation, including the other three
          # jobs and any local dev shell, and pnpm's env-interpolation
          # failure when the var is unset there was corrupting its config
          # parse badly enough to desync from the lockfile's recorded
          # settings — broke `pnpm install --frozen-lockfile` repo-wide
          # (verified by hand, then reverted). Provision NPM_TOKEN as a
          # repo secret (npmjs.com -> Access Tokens -> Generate New Token
          # -> Automation) before this job's publish path can succeed;
          # until then, the version-PR path above still works fine
          # without it (no registry auth needed to just open a PR).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # changeset publish already creates and pushes a `<name>@<version>`
      # git tag per published package; this turns each into an actual
      # GitHub Release with that package's just-generated changelog
      # section as the release notes, per the phase prompt's "create a
      # GitHub Release with the generated changelog" requirement.
      - name: Create GitHub Releases for published packages
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "$PUBLISHED_PACKAGES" | jq -c '.[]' | while read -r pkg; do
            name=$(echo "$pkg" | jq -r '.name')
            version=$(echo "$pkg" | jq -r '.version')
            tag="${name}@${version}"
            dir="packages/${name#@stance-dev/}"
            notes=$(awk -v ver="## $version" 'index($0, ver) == 1 {flag=1; next} /^## /{flag=0} flag' "${dir}/CHANGELOG.md")
            gh release create "$tag" --title "$tag" --notes "$notes"
          done
